<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Growing Forest — VR Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; background: #000; }
      #ui {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        gap: 10px;
      }
      button {
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: rgba(255,255,255,0.9);
        color: #222;
        font-weight: 600;
      }
      button:hover { background: #fff; }
      #instructions {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="instructions">Put on your Meta Quest &amp; tap the VR button — or click "Grow Forest" to start</div>

    <div id="ui">
      <button onclick="growForest()">Grow Forest</button>
      <button onclick="resetForest()">Reset</button>
    </div>

    <a-scene
      background="color: #0a1628"
      fog="type: exponential; color: #0a1628; density: 0.04"
      vr-mode-ui="enabled: true">

      <a-assets>
        <a-mixin id="trunk"
          geometry="primitive: cylinder"
          material="color: #5c3a1e; roughness: 0.9; metalness: 0"
          animation__scale="property: scale; from: 0.001 0.001 0.001; to: 1 1 1; dur: 2000; easing: easeOutElastic; startEvents: grow">
        </a-mixin>

        <a-mixin id="leaves"
          geometry="primitive: sphere; segmentsWidth: 8; segmentsHeight: 6"
          material="color: #2d6a2d; roughness: 1; metalness: 0"
          animation__scale="property: scale; from: 0.001 0.001 0.001; to: 1 1 1; dur: 2500; easing: easeOutElastic; startEvents: grow"
          animation__sway="property: rotation; from: 0 0 -3; to: 0 0 3; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine">
        </a-mixin>
      </a-assets>

      <a-entity id="forest"></a-entity>

      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="60" height="60"
        material="color: #1a3a1a; roughness: 1">
      </a-plane>

      <a-entity id="stars"></a-entity>

      <a-sky color="#0a1628"></a-sky>

      <a-entity id="particles"></a-entity>

      <a-entity light="type: ambient; color: #b0c4de; intensity: 0.6"></a-entity>
      <a-entity light="type: directional; color: #fffde7; intensity: 1.2" position="1 3 2"></a-entity>
      <a-entity light="type: point; color: #4caf50; intensity: 0.5; distance: 20" position="0 2 -5"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 8">
        <a-entity cursor
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="color: white; shader: flat"
          position="0 0 -1">
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const treeConfigs = [
        { x: 0,    z: -4,  delay: 0,    trunkH: 3.5, trunkR: 0.18, canopyR: 2.2, canopyY: 4.2, color: '#2d8c2d' },
        { x: -4,   z: -5,  delay: 600,  trunkH: 2.8, trunkR: 0.14, canopyR: 1.8, canopyY: 3.5, color: '#1e6b1e' },
        { x: 4,    z: -5,  delay: 1200, trunkH: 3.0, trunkR: 0.15, canopyR: 1.9, canopyY: 3.7, color: '#3a9c3a' },
        { x: -7,   z: -3,  delay: 1800, trunkH: 2.4, trunkR: 0.12, canopyR: 1.6, canopyY: 3.1, color: '#2d7a2d' },
        { x: 7,    z: -3,  delay: 2400, trunkH: 2.6, trunkR: 0.13, canopyR: 1.7, canopyY: 3.3, color: '#1a5c1a' },
        { x: -2,   z: -8,  delay: 3000, trunkH: 4.0, trunkR: 0.20, canopyR: 2.5, canopyY: 5.0, color: '#4aab4a' },
        { x: 3,    z: -9,  delay: 3600, trunkH: 3.2, trunkR: 0.16, canopyR: 2.0, canopyY: 4.0, color: '#258c25' },
        { x: -9,   z: -7,  delay: 4200, trunkH: 2.2, trunkR: 0.11, canopyR: 1.5, canopyY: 2.8, color: '#1e701e' },
        { x: 9,    z: -6,  delay: 4800, trunkH: 2.9, trunkR: 0.14, canopyR: 1.85,canopyY: 3.6, color: '#338033' },
        { x: 1,    z: -12, delay: 5400, trunkH: 4.5, trunkR: 0.22, canopyR: 2.8, canopyY: 5.6, color: '#52b552' },
      ];

      function makeTree(cfg) {
        const group = document.createElement('a-entity');
        group.setAttribute('position', `${cfg.x} 0 ${cfg.z}`);

        const trunk = document.createElement('a-cylinder');
        trunk.setAttribute('radius', cfg.trunkR);
        trunk.setAttribute('height', cfg.trunkH);
        trunk.setAttribute('position', `0 ${cfg.trunkH / 2} 0`);
        trunk.setAttribute('color', '#5c3a1e');
        trunk.setAttribute('roughness', '0.95');
        trunk.setAttribute('scale', '0.001 0.001 0.001');
        trunk.classList.add('tree-part');

        const canopy = document.createElement('a-sphere');
        canopy.setAttribute('radius', cfg.canopyR);
        canopy.setAttribute('position', `0 ${cfg.canopyY} 0`);
        canopy.setAttribute('color', cfg.color);
        canopy.setAttribute('roughness', '1');
        canopy.setAttribute('segments-width', '8');
        canopy.setAttribute('segments-height', '6');
        canopy.setAttribute('scale', '0.001 0.001 0.001');
        canopy.classList.add('tree-part');

        const canopy2 = document.createElement('a-sphere');
        canopy2.setAttribute('radius', cfg.canopyR * 0.7);
        canopy2.setAttribute('position', `${cfg.canopyR * 0.4} ${cfg.canopyY + cfg.canopyR * 0.5} ${cfg.canopyR * 0.2}`);
        canopy2.setAttribute('color', cfg.color);
        canopy2.setAttribute('roughness', '1');
        canopy2.setAttribute('segments-width', '6');
        canopy2.setAttribute('segments-height', '5');
        canopy2.setAttribute('scale', '0.001 0.001 0.001');
        canopy2.classList.add('tree-part');

        group.appendChild(trunk);
        group.appendChild(canopy);
        group.appendChild(canopy2);

        return { group, trunk, canopy, canopy2 };
      }

      function animatePart(el, delay, to, dur, easing) {
        setTimeout(() => {
          el.setAttribute('animation', {
            property: 'scale',
            from: '0.001 0.001 0.001',
            to: to,
            dur: dur,
            easing: easing
          });
        }, delay);
      }

      function growForest() {
        const forest = document.getElementById('forest');
        forest.innerHTML = '';

        treeConfigs.forEach(cfg => {
          const { group, trunk, canopy, canopy2 } = makeTree(cfg);
          forest.appendChild(group);

          animatePart(trunk,   cfg.delay,        '1 1 1', 1800, 'easeOutElastic');
          animatePart(canopy,  cfg.delay + 400,  '1 1 1', 2200, 'easeOutElastic');
          animatePart(canopy2, cfg.delay + 600,  '1 1 1', 1800, 'easeOutBounce');

          setTimeout(() => {
            canopy.setAttribute('animation__sway', {
              property: 'rotation',
              from: '0 0 -2',
              to: '0 0 2',
              dur: 2500 + Math.random() * 1000,
              dir: 'alternate',
              loop: true,
              easing: 'easeInOutSine'
            });
          }, cfg.delay + 2800);
        });

        spawnLeafParticles();
        document.getElementById('instructions').textContent = 'Forest growing... put on your Quest and enter VR!';
      }

      function spawnLeafParticles() {
        const container = document.getElementById('particles');
        container.innerHTML = '';
        for (let i = 0; i < 40; i++) {
          const leaf = document.createElement('a-box');
          const x = (Math.random() - 0.5) * 20;
          const y = Math.random() * 6 + 1;
          const z = -(Math.random() * 12 + 2);
          const size = 0.08 + Math.random() * 0.1;
          leaf.setAttribute('position', `${x} ${y} ${z}`);
          leaf.setAttribute('width', size);
          leaf.setAttribute('height', size * 0.4);
          leaf.setAttribute('depth', size);
          leaf.setAttribute('color', ['#2d8c2d','#4aab4a','#1e6b1e','#f5a623','#e8841a'][Math.floor(Math.random()*5)]);
          leaf.setAttribute('roughness', '1');
          const delay = Math.random() * 5000;
          const dur = 4000 + Math.random() * 4000;
          leaf.setAttribute('animation__fall', {
            property: 'position',
            from: `${x} ${y + 3} ${z}`,
            to: `${x + (Math.random()-0.5)*2} ${-0.5} ${z}`,
            dur: dur,
            delay: delay,
            easing: 'linear',
            loop: true
          });
          leaf.setAttribute('animation__spin', {
            property: 'rotation',
            from: '0 0 0',
            to: `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`,
            dur: dur * 0.8,
            delay: delay,
            loop: true,
            easing: 'linear'
          });
          container.appendChild(leaf);
        }
      }

      function resetForest() {
        document.getElementById('forest').innerHTML = '';
        document.getElementById('particles').innerHTML = '';
        document.getElementById('instructions').textContent = 'Click "Grow Forest" to plant your trees!';
      }

      function buildStars() {
        const stars = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
          const star = document.createElement('a-sphere');
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.random() * Math.PI;
          const r = 40;
          star.setAttribute('position', {
            x: r * Math.sin(phi) * Math.cos(theta),
            y: Math.abs(r * Math.cos(phi)) + 5,
            z: r * Math.sin(phi) * Math.sin(theta)
          });
          star.setAttribute('radius', 0.05 + Math.random() * 0.1);
          star.setAttribute('color', '#ffffff');
          star.setAttribute('shader', 'flat');
          stars.appendChild(star);
        }
      }

      buildStars();
    </script>
  </body>
</html>
